# Throwaway databases for the integration suite (it/run.sh). Host ports are
# offset (3xxxx) so a locally running DB never collides. Credentials are
# container-lifetime only — nothing here is a real secret.
services:
  mysql:
    image: mysql:8.4
    command: --local-infile=ON # LoadDataSink uses LOAD DATA LOCAL INFILE
    environment:
      MYSQL_ROOT_PASSWORD: it
      MYSQL_DATABASE: it
    ports: ["33306:3306"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -pit"]
      interval: 2s
      timeout: 2s
      retries: 60

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: it
      POSTGRES_DB: it
    ports: ["35432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 30

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "It_Passw0rd1"
    ports: ["31433:1433"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -U sa -P It_Passw0rd1 -Q 'select 1' -b"]
      interval: 3s
      timeout: 3s
      retries: 60

  starrocks:
    image: starrocks/allin1-ubuntu:3.3-latest
    ports: ["39030:9030", "38040:8040"]
    healthcheck:
# FE answers SQL long before a BE registers; stream load needs an alive BE.
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P9030 -uroot -e 'show backends\\G' | grep -q 'Alive: true'"]
      interval: 5s
      timeout: 5s
      retries: 120
