name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  ZIG_VERSION: 0.15.2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install Zig directly from the official release (tarball naming is arch-first
      # since 0.14.1: zig-<arch>-<os>-<version>); avoids stale third-party actions.
      - name: Cache Zig
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: ~/.zig
          key: zig-${{ env.ZIG_VERSION }}-x86_64-linux
      - name: Install Zig
        if: steps.zig-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.zig
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ -C ~/.zig --strip-components=1
      - name: Add Zig to PATH
        run: echo "$HOME/.zig" >> "$GITHUB_PATH"
      - name: Build
        run: zig build
      - name: Test
        run: zig build test
      - name: Release cross-build (the artifact the image ships)
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux-musl -Dstrip=true

  image:
    # Build & publish the container image on pushes to main and on tags; PRs only test.
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publish the raw static binary as a release asset on tags, so it can be run
  # directly (e.g. downloaded + executed in a Windmill bash step — no container).
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: |
          mkdir -p ~/.zig
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ -C ~/.zig --strip-components=1
          echo "$HOME/.zig" >> "$GITHUB_PATH"
      - name: Build static binary
        run: |
          zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux-musl -Dstrip=true
          cp zig-out/bin/basalt basalt-x86_64-linux
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: basalt-x86_64-linux
